<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Física Prime Lab</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #f0f2f5; color: #1c1e21; }
        header { background: #2c3e50; color: white; padding: 40px 20px; text-align: center; border-bottom: 4px solid #3498db; }
        
        nav { 
            display: flex; flex-wrap: wrap; justify-content: center; 
            gap: 10px; padding: 20px; background: white; 
            position: sticky; top: 0; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 100;
        }

        nav button { 
            padding: 12px 18px; border: none; border-radius: 6px; 
            background: #e4e6eb; font-weight: 600; cursor: pointer; transition: 0.2s;
        }

        nav button:hover, nav button.active { background: #3498db; color: white; }

        main { max-width: 800px; margin: 30px auto; padding: 0 15px; }

        .card-aula {
            background: white; padding: 35px; border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 25px;
            line-height: 1.7; border-top: 5px solid #3498db;
        }

        .card-aula h2 { color: #2c3e50; margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        p { margin-bottom: 1.2em; text-align: justify; }
        
        #mensagem { text-align: center; color: #65676b; margin-top: 50px; font-size: 1.1rem; }
    </style>
</head>
<body>

<header>
    <h1>Física Prime Lab</h1>
    <p>Portal Técnico de Aprendizagem</p>
</header>

<nav id="menu-areas">
    <button onclick="carregar('Mecânica', this)">Mecânica</button>
    <button onclick="carregar('Hidrostática e Hidrodinâmica', this)">Hidrostática</button>
    <button onclick="carregar('Termologia e Termodinâmica', this)">Termodinâmica</button>
    <button onclick="carregar('Óptica', this)">Óptica</button>
    <button onclick="carregar('Ondulatória', this)">Ondulatória</button>
    <button onclick="carregar('Eletricidade e Magnetismo', this)">Eletromagnetismo</button>
    <button onclick="carregar('Física Moderna', this)">Física Moderna</button>
</nav>

<main>
    <div id="mensagem">Por favor, selecione uma matéria acima.</div>
    <div id="conteudo"></div>
</main>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycbwsWAYcKuZ0St1qSCQyTXhBP1cCtuAvNM2A4J1FvpqxGPb2pYxHK8gglWkvBnxK0F2QQA/exec"; 
    let dadosCache = null;

    async function carregar(materia, btn) {
        const areaConteudo = document.getElementById('conteudo');
        const msg = document.getElementById('mensagem');
        
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        msg.style.display = "block";
        msg.innerHTML = `Carregando <b>${materia}</b>...`;
        areaConteudo.innerHTML = "";

        try {
            if (!dadosCache) {
                const response = await fetch(URL_API);
                dadosCache = await response.json();
            }

            const aulas = dadosCache[materia];
            msg.style.display = "none";

            if (!aulas || aulas.length === 0) {
                areaConteudo.innerHTML = `<div class="card-aula"><h2>Aviso</h2><p>Nenhum conteúdo encontrado para esta área.</p></div>`;
                return;
            }

            aulas.forEach(aula => {
                const div = document.createElement('div');
                div.className = 'card-aula';
                
                // Formata o texto em parágrafos para não ficar "feio"
                const textoLimpo = aula.texto.split('\n')
                    .filter(l => l.trim() !== '')
                    .map(l => `<p>${l}</p>`)
                    .join('');

                div.innerHTML = `<h2>Conteúdo Teórico</h2>${textoLimpo}`;
                areaConteudo.appendChild(div);
            });

        } catch (e) {
            msg.innerHTML = "Erro ao conectar. Verifique se o Script foi publicado como 'Qualquer pessoa'.";
        }
    }
</script>

</body>
</html>
